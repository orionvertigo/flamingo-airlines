<!DOCTYPE html>
<html>
  <head>
    <title>My First Page</title>
    <style>
      body {
        background-color: #f7f7f6;
        font-family: "Neue Montreal", Inter, "Helvetica Neue", Arial;
        margin: 0;
      }
      nav {
        background-color: 	#811331;
        color: white;
        padding: 20px;
        font-size: 20px;
      }
      .hero {
        background-color: #DE3163;
        color: white;
        padding: 120px 60px;
      }
      .content {
        padding: 40px;
      }
      .content h3 {
        margin-bottom: 20px;
      }
      a {
        color: 	#FF7F50;
        font-weight: bold;
      }

      button {
        background-color: #811331;
        color: white;
        padding: 12px 24px;
        border: none;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <nav>
      <p>Flamingo Airlines</p>
    </nav>
    <div class="hero">
      <h1>We move the world forward.</h1>
      <p>Connecting people across every distance.</p>
    </div>
    <div class="content">
      <h3>Our Essence</h3>
      <p>We are more than an airline.</p>
      <a href="https://www.flamingoairlines.com">Book a flight</a>
      <button>Learn More</button>
    </div>
  </body>
</html>
